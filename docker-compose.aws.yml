# Docker Compose configuration for AWS EC2 failover deployment
#
# Usage:  docker compose -f docker-compose.aws.yml up -d --build
#
# This is a standalone variant of docker-compose.yml for the EC2 rebuild path.
# Differences from the NUC compose file:
#   - mongo-backup writes to a named Docker volume (no NAS mount)
#   - Off-site S3 replication must be handled separately (e.g. host-level
#     aws s3 sync cron — see docs/NUC_DEPLOYMENT.md Phase 8)
#
# The primary compose file (docker-compose.yml) targets the NUC with a
# Synology NAS bind mount for backups.

services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - radio-forms

  formio:
    image: formio/formio:4.6.0
    container_name: formio
    restart: always
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      DEBUG: formio:*
      ROOT_EMAIL: ${ROOT_EMAIL:-admin@example.com}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-changeme}
      API_KEYS: ${API_KEYS}
      FORMIO_DOMAIN: ${FORMIO_DOMAIN:-http://localhost:3001}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_MANAGEMENT_EMAIL: ${SMTP_MANAGEMENT_EMAIL:-}
    volumes:
      - ./config/env/production.json:/app/config/production.json:ro
      - ./config/bootstrap/default-template.json:/app/default-template.json:ro
      - ./config/actions/UpdateLatestRoleLogId.js:/app/src/actions/UpdateLatestRoleLogId.js:ro
      - ./scripts/lib/post-bootstrap.js:/app/post-bootstrap.js:ro
      - ./scripts/lib/run-migrations.js:/app/run-migrations.js:ro
      - ./scripts/migrations:/app/migrations:ro
    networks:
      - radio-forms

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - formio
    ports:
      - "80:80"
      - "443:443"
    environment:
      - EMAIL=${EMAIL:-admin@example.com}
      - SPA_DOMAIN=${SPA_DOMAIN:-localhost}
      - API_DOMAIN=${API_DOMAIN:-api.localhost}
    volumes:
      - ./app:/var/www/html:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - radio-forms

  mongo-backup:
    build:
      context: ./deployment/mongo-backup
      dockerfile: Dockerfile
    container_name: mongo-backup
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      - BACKUP_ROOT=/backup/mongo
      - BACKUP_RETENTION_DAYS=${BACKUPS_RETENTION_DAYS:-30}
    volumes:
      - mongo-backup-data:/backup
    networks:
      - radio-forms

volumes:
  mongo-data:
  caddy_data:
  caddy_config:
  mongo-backup-data:

networks:
  radio-forms:
    driver: bridge
