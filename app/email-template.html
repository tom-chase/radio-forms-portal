<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ form.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      color: #212529;
    }
    .wrapper {
      max-width: 600px;
      margin: 32px auto;
      background-color: #ffffff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .header {
      background-color: #0d6efd;
      padding: 20px 32px;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.01em;
    }
    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }
    .body {
      padding: 28px 32px;
      line-height: 1.6;
    }
    .body p {
      margin: 0 0 12px;
    }
    .body strong {
      color: #343a40;
    }
    .footer {
      background-color: #f8f9fa;
      border-top: 1px solid #e9ecef;
      padding: 14px 32px;
      font-size: 12px;
      color: #6c757d;
    }
    .footer a {
      color: #0d6efd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{{ form.title }}</h1>
      <p>Radio Forms Portal Notification</p>
    </div>
    <div class="body">
      {{ content }}
    </div>
    <div class="footer">
      This is an automated message from the Radio Forms Portal. Please do not reply to this email.
    </div>
  </div>
</body>
</html>
