<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsor Our Station — Request More Information</title>
    <meta name="description" id="page-meta-description" content="Become a sponsor of our independent community radio station. Reach an educated, engaged, community-minded audience.">

    <!-- Environment Configuration (Generated during deployment) -->
    <script src="/config.js"></script>

    <!-- Bootstrap CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        crossorigin="anonymous"
    />

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Form.io CSS -->
    <link rel="stylesheet" href="https://cdn.form.io/formiojs/formio.full.min.css">

    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #e0c06a;
            --dark-bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --text-light: #f0ede8;
            --text-muted: #a89880;
            --border-radius: 12px;
            --box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* ── Page wrapper ── */
        .page-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* ── Station logo ── */
        .station-logo {
            max-height: 90px;
            max-width: 200px;
            object-fit: contain;
            margin-bottom: 28px;
            display: block;
        }

        .station-logo-placeholder {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .station-logo-placeholder i {
            font-size: 1.6rem;
        }

        /* ── Marketing copy column ── */
        .copy-col {
            padding-right: 48px;
        }

        .page-headline {
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .page-headline span {
            color: var(--gold);
        }

        .page-tagline {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        /* ── Audience stat cards ── */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .stat-icon {
            color: var(--gold);
            font-size: 1.4rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .stat-content strong {
            display: block;
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .stat-content span {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* ── Values section ── */
        .values-heading {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
        }

        .values-list {
            list-style: none;
            padding: 0;
            margin: 0 0 28px 0;
        }

        .values-list li {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.55;
        }

        .values-list li i {
            color: var(--gold);
            flex-shrink: 0;
            margin-top: 3px;
        }

        .values-list li strong {
            color: var(--text-light);
        }

        /* ── FCC note ── */
        .fcc-note {
            font-size: 0.78rem;
            color: #6c6c6c;
            border-top: 1px solid #333;
            padding-top: 16px;
            line-height: 1.6;
        }

        /* ── Form column ── */
        .form-col {
            display: flex;
            flex-direction: column;
        }

        .form-card {
            background: #ffffff;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            flex: 1;
        }

        .form-card-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-bottom: 3px solid var(--gold);
            padding: 24px 32px 20px;
        }

        .form-card-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-light);
            margin: 0 0 4px;
        }

        .form-card-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .form-card-body {
            padding: 28px 32px 32px;
        }

        /* ── Form.io overrides (inside white card) ── */
        #formio .formio-component,
        #formio .form-group {
            margin-bottom: 1.25rem;
        }

        #formio .form-control {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 10px 14px;
            font-size: 0.9rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #formio .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 0.2rem rgba(201, 168, 76, 0.2);
        }

        #formio .btn-primary {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1a1a;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 8px;
            width: 100%;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        #formio .btn-primary:hover,
        #formio .btn-primary:focus {
            background: var(--gold-light);
            border-color: var(--gold-light);
            color: #1a1a1a;
            transform: translateY(-1px);
        }

        #formio label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #2d2d2d;
        }

        #formio .form-text {
            font-size: 0.78rem;
        }

        /* ── Status messages ── */
        .status-message {
            display: none;
            border-radius: var(--border-radius);
            padding: 20px 24px;
            margin-top: 16px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .status-message.show {
            display: block;
            animation: slideInUp 0.4s ease;
        }

        .status-message.success {
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            color: #065f46;
        }

        .status-message.error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        /* ── Loading spinner ── */
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 48px 0;
            color: var(--text-muted);
        }

        .loading-spinner.show {
            display: block;
        }

        .loading-spinner .spinner-border {
            color: var(--gold) !important;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 991px) {
            .copy-col {
                padding-right: 0;
                margin-bottom: 36px;
            }

            .page-wrapper {
                padding: 32px 16px;
            }
        }

        @media (max-width: 575px) {
            .form-card-body,
            .form-card-header {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="row align-items-start g-0">

            <!-- ── LEFT: Marketing copy (rendered dynamically) ── -->
            <div class="col-12 col-lg-6 copy-col" id="marketing-col">
                <!-- Populated by renderMarketingContent() -->
            </div>

            <!-- ── RIGHT: Form ── -->
            <div class="col-12 col-lg-6 form-col">
                <div class="form-card">
                    <div class="form-card-header" id="form-card-header">
                        <h2 id="form-card-title">Request Sponsorship Information</h2>
                        <p id="form-card-subtitle">We'll be in touch within 2 business days.</p>
                    </div>
                    <div class="form-card-body">

                        <!-- Loading spinner -->
                        <div id="loading-spinner" class="loading-spinner">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading…</span>
                            </div>
                            <p class="mt-3" style="font-size:0.85rem;">Loading form…</p>
                        </div>

                        <!-- Form container -->
                        <div id="formio"></div>

                        <!-- Success message -->
                        <div id="success-message" class="status-message success">
                            <i class="fas fa-check-circle me-2"></i>
                            <strong>Thank you!</strong> Your inquiry has been submitted. We'll be in touch within 2 business days.
                        </div>

                        <!-- Error message -->
                        <div id="error-message" class="status-message error">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <strong>Something went wrong.</strong> Please try again or contact us directly if the problem persists.
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Form.io JavaScript library -->
    <script src="https://cdn.form.io/formiojs/formio.full.min.js"></script>

    <script>
        // ── Station branding (from config.js / window globals) ──
        var _stationName = window.STATION_NAME    || 'Your Radio Station';
        var _callSign    = window.STATION_CALL_SIGN || '';
        var _logoUrl     = window.STATION_LOGO_URL  || '';

        // Update page title and meta description with station identity
        (function() {
            var label = _callSign || _stationName;
            if (label) {
                document.title = 'Sponsor ' + label + ' — Request More Information';
                var metaDesc = document.getElementById('page-meta-description');
                if (metaDesc) metaDesc.setAttribute('content', 'Become a sponsor of ' + label + ', an independent community radio station. Reach an educated, engaged, community-minded audience.');
            }
        })();

        // ── Form configuration ──
        var API_BASE = window.API_BASE_URL || 'http://localhost:3001';
        var CONFIG = {
            formDefUrl: API_BASE + '/contactintake',
            resetDelay: 8000,
            enableAnalytics: false
        };

        var elements = {
            formContainer:   document.getElementById('formio'),
            successMessage:  document.getElementById('success-message'),
            errorMessage:    document.getElementById('error-message'),
            loadingSpinner:  document.getElementById('loading-spinner'),
            marketingCol:    document.getElementById('marketing-col'),
            formCardTitle:   document.getElementById('form-card-title'),
            formCardSubtitle:document.getElementById('form-card-subtitle')
        };

        // ── Escape helper (prevent XSS from DB content) ──
        function esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Render station logo / wordmark ──
        function renderLogo() {
            if (_logoUrl) {
                return '<img src="' + esc(_logoUrl) + '" alt="' + esc(_stationName) + '" class="station-logo">';
            }
            var label = _callSign || _stationName;
            return '<div class="station-logo-placeholder"><i class="fas fa-broadcast-tower"></i>' + esc(label) + '</div>';
        }

        // ── Render stat cards ──
        function renderStats(stats) {
            if (!Array.isArray(stats) || !stats.length) return '';
            var html = '<div class="stat-grid">';
            stats.forEach(function(s) {
                html += '<div class="stat-card">' +
                    '<div class="stat-icon"><i class="' + esc(s.icon) + '"></i></div>' +
                    '<div class="stat-content">' +
                    '<strong>' + esc(s.title) + '</strong>' +
                    '<span>' + esc(s.body) + '</span>' +
                    '</div></div>';
            });
            html += '</div>';
            return html;
        }

        // ── Render values list ──
        function renderValues(heading, values) {
            if (!Array.isArray(values) || !values.length) return '';
            var html = '<p class="values-heading">' + esc(heading) + '</p><ul class="values-list">';
            values.forEach(function(v) {
                html += '<li><i class="' + esc(v.icon) + '"></i>' +
                    '<div><strong>' + esc(v.title) + '</strong> — ' + esc(v.body) + '</div></li>';
            });
            html += '</ul>';
            return html;
        }

        // ── Render full left-column marketing content ──
        function renderMarketingContent(mc) {
            mc = mc || {};

            var headline = mc.headline || 'Request Sponsorship Information';
            var tagline  = mc.tagline  || '';
            var fccNote  = mc.fccNote  || '';

            var html = renderLogo();

            html += '<h1 class="page-headline">' + esc(headline) + '</h1>';

            if (tagline) {
                html += '<p class="page-tagline">' + esc(tagline) + '</p>';
            }

            html += renderStats(mc.stats);
            html += renderValues(mc.valuesHeading || 'What makes an ideal sponsor?', mc.values);

            if (fccNote) {
                html += '<p class="fcc-note"><i class="fas fa-info-circle me-1"></i>' + esc(fccNote) + '</p>';
            }

            elements.marketingCol.innerHTML = html;

            // Update form card header text
            if (mc.formTitle)    elements.formCardTitle.textContent    = mc.formTitle;
            if (mc.formSubtitle) elements.formCardSubtitle.textContent = mc.formSubtitle;
        }

        // ── Show loading state ──
        elements.loadingSpinner.classList.add('show');
        elements.formContainer.style.display = 'none';

        // ── Fetch form definition (anonymous, no auth required) then render form ──
        fetch(CONFIG.formDefUrl)
            .then(function(res) { return res.ok ? res.json() : Promise.reject(res.status); })
            .then(function(formDef) {
                var mc = (formDef.settings && formDef.settings.ui && formDef.settings.ui.marketingContent)
                    ? formDef.settings.ui.marketingContent
                    : {};
                renderMarketingContent(mc);
            })
            .catch(function(err) {
                console.warn('Could not load form definition for marketing content:', err);
                renderMarketingContent({});
            })
            .finally(function() {
                // ── Create the embedded form ──
                Formio.createForm(elements.formContainer, CONFIG.formDefUrl, {
                    readOnly: false,
                    breadcrumbSettings: { clickable: false },
                    buttonSettings: { showCancel: false }
                })
                .then(function(form) {
                    elements.loadingSpinner.classList.remove('show');
                    elements.formContainer.style.display = 'block';

                    form.on('submitDone', function(submission) {
                        elements.formContainer.style.display = 'none';
                        elements.successMessage.classList.add('show');

                        if (CONFIG.enableAnalytics && typeof gtag !== 'undefined') {
                            gtag('event', 'form_submit', {
                                'event_category': 'Sponsorship Inquiry',
                                'event_label': 'Contact Submission'
                            });
                        }

                        setTimeout(function() {
                            elements.successMessage.classList.remove('show');
                            elements.formContainer.style.display = 'block';
                            form.submission = { data: {} };
                            elements.formContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, CONFIG.resetDelay);
                    });

                    form.on('error', function(errors) {
                        console.error('Form error:', errors);
                        elements.errorMessage.classList.add('show');
                        setTimeout(function() {
                            elements.errorMessage.classList.remove('show');
                        }, 5000);
                    });
                })
                .catch(function(error) {
                    console.error('Error loading form:', error);
                    elements.loadingSpinner.classList.remove('show');
                    elements.formContainer.style.display = 'block';
                    elements.formContainer.innerHTML =
                        '<div class="alert alert-danger" role="alert">' +
                        '<i class="fas fa-exclamation-triangle me-2"></i>' +
                        '<strong>Unable to load the form.</strong><br>' +
                        'Please try refreshing the page or contact us directly if the problem persists.' +
                        '</div>';
                });
            });
    </script>
</body>
</html>
